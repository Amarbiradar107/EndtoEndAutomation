version: "3"

services:
  jenkins:
    image: jenkins/jenkins:latest
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./Volume/Master:/var/jenkins_home

  selenium-hud:
    image: selenium/hub:4.41.0
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"

  chrome:
    image: selenium/node-chrome:latest
    environment:
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_EVENT_BUS_HOST=selenium-hud
    depends_on:
      - selenium-hud
    shm_size: "2g"

  firefox:
    image: selenium/node-firefox:latest
    environment:
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_EVENT_BUS_HOST=selenium-hud
    depends_on:
      - selenium-hud
    shm_size: "2g"

  edge:
    image: selenium/node-edge:latest
    environment:
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_EVENT_BUS_HOST=selenium-hud
    depends_on:
      - selenium-hud
    shm_size: "2g"

